<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Smart Sheet Matcher</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#f3f4f6;min-height:100vh;padding:32px 16px}
  .card{background:white;border:1px solid #e5e7eb;border-radius:12px;padding:24px;margin-bottom:16px}
  .btn{padding:12px 20px;border-radius:10px;border:none;font-weight:600;font-size:15px;cursor:pointer;transition:opacity .2s}
  .btn:disabled{background:#e5e7eb!important;color:#9ca3af!important;cursor:not-allowed}
  .btn-primary{background:#6366f1;color:white;width:100%}
  .btn-green{background:#059669;color:white}
  .btn-outline{background:white;border:1px solid #d1d5db!important;color:#374151}
  select{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #d1d5db;font-size:14px;background:white}
  label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .dropzone{border:2px dashed #d1d5db;border-radius:12px;padding:24px;text-align:center;cursor:pointer;background:#f9fafb;transition:all .2s}
  .dropzone.active{border-color:#6366f1;background:#eef2ff}
  .dropzone .icon{font-size:32px;margin-bottom:8px}
  .dropzone .title{font-weight:600;color:#374151}
  .dropzone .sub{color:#9ca3af;font-size:13px;margin-top:4px}
  .stat{border-radius:10px;padding:16px;text-align:center}
  .stat .num{font-size:28px;font-weight:700}
  .stat .lbl{font-size:12px;margin-top:2px}
  .alert{border-radius:8px;padding:10px 14px;font-size:14px;margin-bottom:16px}
  .alert-err{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626}
  .alert-info{background:#fffbeb;border:1px solid #fde68a;color:#92400e;font-size:13px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{padding:8px 12px;text-align:left;font-weight:600;color:#374151;background:#f3f4f6;white-space:nowrap;position:sticky;top:0}
  td{padding:7px 12px;color:#374151;border-top:1px solid #f3f4f6}
  tr:nth-child(even) td{background:#fafafa}
  .scroll{overflow-x:auto;max-height:300px;overflow-y:auto}
  .steps{display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:32px}
  .step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:#e5e7eb;color:#9ca3af}
  .step-dot.on{background:#6366f1;color:white}
  .step-lbl{font-size:13px;color:#9ca3af}
  .step-lbl.on{color:#4f46e5;font-weight:600}
  .step-line{width:24px;height:2px;background:#e5e7eb}
  .unmatched-box{background:#fffbeb;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden}
  .unmatched-box.red{background:#fef2f2}
  .unmatched-hdr{padding:10px 14px;font-weight:600;font-size:13px;border-bottom:1px solid #e5e7eb}
  .unmatched-list{max-height:180px;overflow-y:auto;padding:8px 14px}
  .unmatched-item{font-size:13px;color:#374151;padding:3px 0;border-bottom:1px solid #f3f4f6}
  .row-btns{display:flex;gap:10px;margin-top:4px}
  h1{font-size:28px;font-weight:700;color:#111827}
  .center{text-align:center}
  .sub-title{color:#6b7280;margin-top:6px}
  .tbl-hdr{padding:12px 16px;background:#f9fafb;border-bottom:1px solid #e5e7eb;font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center}
  .btn-sm{padding:6px 12px;border-radius:7px;border:none;background:#6366f1;color:white;font-weight:600;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div style="max-width:780px;margin:0 auto">
  <div class="center" style="margin-bottom:32px">
    <h1>🔗 Smart Sheet Matcher</h1>
    <p class="sub-title">AI-powered fuzzy matching for company names across two spreadsheets</p>
  </div>

  <div class="steps" id="steps"></div>
  <div id="error-box" class="alert alert-err" style="display:none"></div>
  <div id="app"></div>
</div>

<script>
const MODEL = "claude-sonnet-4-20250514";
let state = {
  step: "upload", // upload | config | results
  sheet1: null, sheet2: null,
  file1: "", file2: "",
  nameCol1: "", nameCol2: "",
  idCol1: "", idCol2: "",
  matches: [], unmatched1: [], unmatched2: [],
  loading: false, progress: ""
};

function setState(patch) { Object.assign(state, patch); render(); }
function showError(msg) {
  const el = document.getElementById("error-box");
  if (msg) { el.textContent = "⚠️ " + msg; el.style.display = "block"; }
  else { el.style.display = "none"; }
}

function parseFile(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: "binary" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        res(XLSX.utils.sheet_to_json(ws, { defval: "" }));
      } catch(err) { rej(err); }
    };
    r.onerror = rej;
    r.readAsBinaryString(file);
  });
}

function downloadCSV(rows, filename) {
  if (!rows.length) return;
  const hdrs = Object.keys(rows[0]);
  const csv = [hdrs.join(","), ...rows.map(r =>
    hdrs.map(h => `"${String(r[h]??"").replace(/"/g,'""')}"`).join(",")
  )].join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

function safeParseJSON(text) {
  const clean = text.replace(/```json|```/g,"").trim();
  // 1. Direct parse
  try { return JSON.parse(clean); } catch {}
  // 2. Trim to last complete object then close the array
  const last = clean.lastIndexOf("}");
  if (last === -1) return [];
  const start = clean.indexOf("[");
  if (start === -1) return [];
  try { return JSON.parse(clean.slice(start, last+1) + "]"); } catch {}
  // 3. Extract individual objects with regex
  const objs = [];
  const re = /\{\s*"a"\s*:\s*"((?:[^"\\]|\\.)*)"\s*,\s*"b"\s*:\s*"((?:[^"\\]|\\.)*)"\s*,\s*"confidence"\s*:\s*([\d.]+)\s*\}/g;
  let m;
  while ((m = re.exec(clean)) !== null) {
    objs.push({ a: m[1], b: m[2], confidence: parseFloat(m[3]) });
  }
  return objs;
}

async function matchBatch(batchA, listB) {
  const prompt = `You are a data matching assistant. Match company names from List A to the best candidate in List B.
Account for: LLC/Inc/Ltd/Corp/Co suffixes, punctuation, abbreviations, extra words, capitalization.

List A:
${batchA.map((n,i)=>`${i+1}. ${n}`).join("\n")}

List B:
${listB.map((n,i)=>`${i+1}. ${n}`).join("\n")}

Rules:
- Only match if confidence >= 0.7
- Return ONLY a valid JSON array, no markdown, no explanation
- Format: [{"a":"exact name from A","b":"exact name from B","confidence":0.95}]
- If no match found for a name, omit it`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: MODEL, max_tokens: 4000, messages: [{ role:"user", content: prompt }] })
  });
  if (!res.ok) throw new Error("API error: " + res.status);
  const data = await res.json();
  const text = data.content?.find(c=>c.type==="text")?.text || "[]";
  return safeParseJSON(text);
}

async function runMatching() {
  setState({ loading: true, progress: "Preparing data..." });
  showError("");

  const { sheet1, sheet2, nameCol1, nameCol2, idCol1, idCol2 } = state;
  const names1 = [...new Set(sheet1.map(r=>r[nameCol1]).filter(Boolean))];
  const names2 = [...new Set(sheet2.map(r=>r[nameCol2]).filter(Boolean))];
  const id1Map = {}, id2Map = {};
  if (idCol1) sheet1.forEach(r => { if(r[nameCol1]) id1Map[r[nameCol1]] = r[idCol1]; });
  if (idCol2) sheet2.forEach(r => { if(r[nameCol2]) id2Map[r[nameCol2]] = r[idCol2]; });

  const BATCH = 15;
  const allMatches = [], matchedNames2 = new Set();
  let failed = 0;

  for (let i = 0; i < names1.length; i += BATCH) {
    const batch = names1.slice(i, i+BATCH);
    setState({ progress: `Matching ${Math.min(i+BATCH, names1.length)} / ${names1.length}...` });
    try {
      const parsed = await matchBatch(batch, names2);
      for (const m of parsed) {
        if (m.a && m.b) {
          const row = { [`Sheet1_${nameCol1}`]: m.a };
          if (idCol1 && idCol1 !== nameCol1) row[`Sheet1_${idCol1}`] = id1Map[m.a] ?? "";
          row[`Sheet2_${nameCol2}`] = m.b;
          if (idCol2 && idCol2 !== nameCol2) row[`Sheet2_${idCol2}`] = id2Map[m.b] ?? "";
          row["Confidence"] = Math.round(m.confidence*100) + "%";
          allMatches.push(row);
          matchedNames2.add(m.b);
        }
      }
    } catch(e) { failed++; console.warn("Batch failed:", e.message); }
  }

  if (failed > 0 && allMatches.length === 0) {
    showError(`All ${failed} batches failed. Check your API key and try again.`);
    setState({ loading: false });
    return;
  }

  const matchedNames1 = new Set(allMatches.map(m => m[`Sheet1_${nameCol1}`]));
  setState({
    loading: false, step: "results",
    matches: allMatches,
    unmatched1: names1.filter(n => !matchedNames1.has(n)),
    unmatched2: names2.filter(n => !matchedNames2.has(n))
  });
}

// ---- RENDER ----
function renderSteps() {
  const s = state.step;
  const steps = [["1","Upload","upload"],["2","Configure","config"],["3","Results","results"]];
  const order = ["upload","config","results"];
  const cur = order.indexOf(s);
  document.getElementById("steps").innerHTML = steps.map(([num,lbl,key], i) => {
    const on = i <= cur;
    const done = i < cur;
    return `<div class="step-dot ${on?"on":""}">${done?"✓":num}</div>
    <span class="step-lbl ${on?"on":""}">${lbl}</span>
    ${i<2?'<div class="step-line"></div>':''}`;
  }).join("");
}

function colOptions(cols, val, includeNone) {
  return (includeNone ? `<option value="">(none)</option>` : `<option value="">Select column...</option>`) +
    cols.map(c => `<option value="${c}" ${val===c?"selected":""}>${c}</option>`).join("");
}

function renderUpload() {
  const dz = (which) => {
    const file = which===1 ? state.file1 : state.file2;
    const rows = which===1 ? state.sheet1 : state.sheet2;
    const active = !!file;
    return `<div class="dropzone ${active?"active":""}" onclick="triggerFile(${which})" ondrop="handleDrop(event,${which})" ondragover="event.preventDefault()">
      <input type="file" id="fi${which}" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFileInput(event,${which})"/>
      <div class="icon">${active?"✅":"📂"}</div>
      ${active
        ? `<div class="title" style="color:#4f46e5">${file}</div><div class="sub">${rows?.length} rows loaded</div>`
        : `<div class="title">Sheet ${which} ${which===1?"(Primary)":"(Secondary)"}</div><div class="sub">Drag & drop or click — .xlsx, .xls, .csv</div>`}
    </div>`;
  };
  const ok = state.sheet1 && state.sheet2;
  return `<div class="grid2" style="margin-bottom:24px">${dz(1)}${dz(2)}</div>
    <button class="btn btn-primary" onclick="setState({step:'config'})" ${ok?"":"disabled"}>Continue to Configure →</button>`;
}

function renderConfig() {
  const c1 = state.sheet1 ? Object.keys(state.sheet1[0]||{}) : [];
  const c2 = state.sheet2 ? Object.keys(state.sheet2[0]||{}) : [];
  const ok = state.nameCol1 && state.nameCol2;
  const lbl = state.loading ? `⏳ ${state.progress}` : "🚀 Run AI Matching";
  return `<div class="card">
    <h3 style="margin-bottom:16px;font-weight:600">Column Mapping</h3>
    <div class="grid2">
      <div><label>Sheet 1 — Name Column *</label>
        <select onchange="setState({nameCol1:this.value})">${colOptions(c1,state.nameCol1,false)}</select></div>
      <div><label>Sheet 2 — Name Column *</label>
        <select onchange="setState({nameCol2:this.value})">${colOptions(c2,state.nameCol2,false)}</select></div>
      <div><label>Sheet 1 — ID Column (optional)</label>
        <select onchange="setState({idCol1:this.value==='(none)'?'':this.value})">${colOptions(["(none)",...c1],state.idCol1||"(none)",false)}</select></div>
      <div><label>Sheet 2 — ID Column (optional)</label>
        <select onchange="setState({idCol2:this.value==='(none)'?'':this.value})">${colOptions(["(none)",...c2],state.idCol2||"(none)",false)}</select></div>
    </div>
  </div>
  <div class="alert alert-info" style="margin-bottom:16px">💡 Names are matched in batches of 25. ID columns are optional but help you VLOOKUP results back into your data.</div>
  <div class="row-btns">
    <button class="btn btn-outline" style="border:1px solid #d1d5db" onclick="setState({step:'upload'})">← Back</button>
    <button class="btn btn-primary" onclick="runMatching()" ${ok&&!state.loading?"":"disabled"}>${lbl}</button>
  </div>`;
}

function renderResults() {
  const { matches, unmatched1, unmatched2, nameCol1, nameCol2 } = state;
  const stats = `<div class="grid3" style="margin-bottom:20px">
    <div class="stat" style="background:#d1fae5"><div class="num" style="color:#065f46">${matches.length}</div><div class="lbl" style="color:#065f46">Matched</div></div>
    <div class="stat" style="background:#fef3c7"><div class="num" style="color:#92400e">${unmatched1.length}</div><div class="lbl" style="color:#92400e">Unmatched Sheet 1</div></div>
    <div class="stat" style="background:#fee2e2"><div class="num" style="color:#991b1b">${unmatched2.length}</div><div class="lbl" style="color:#991b1b">Unmatched Sheet 2</div></div>
  </div>`;

  const hdrs = matches[0] ? Object.keys(matches[0]) : [];
  const tableRows = matches.map((r,i)=>`<tr>${hdrs.map(h=>`<td>${r[h]??""}</td>`).join("")}</tr>`).join("");
  const table = `<div class="card" style="padding:0;overflow:hidden;margin-bottom:16px">
    <div class="tbl-hdr"><span>✅ Matched Pairs (${matches.length})</span>
      <button class="btn-sm" onclick="downloadCSV(window._matches,'matched.csv')">⬇ Download CSV</button></div>
    <div class="scroll"><table><thead><tr>${hdrs.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${tableRows}</tbody></table></div>
  </div>`;

  const unmGrid = (unmatched1.length > 0 || unmatched2.length > 0) ? `<div class="grid2" style="margin-bottom:16px">
    ${unmatched1.length>0?`<div class="unmatched-box"><div class="unmatched-hdr">Unmatched in Sheet 1 (${unmatched1.length})</div>
      <div class="unmatched-list">${unmatched1.map(n=>`<div class="unmatched-item">${n}</div>`).join("")}</div></div>`:""}
    ${unmatched2.length>0?`<div class="unmatched-box red"><div class="unmatched-hdr">Unmatched in Sheet 2 (${unmatched2.length})</div>
      <div class="unmatched-list">${unmatched2.map(n=>`<div class="unmatched-item">${n}</div>`).join("")}</div></div>`:""}
  </div>` : "";

  const btns = `<div class="row-btns">
    <button class="btn btn-outline" style="border:1px solid #d1d5db" onclick="setState({step:'config',matches:[],unmatched1:[],unmatched2:[]})">← Reconfigure</button>
    <button class="btn btn-green" style="flex:1" onclick="downloadCSV(window._matches,'matched.csv')">⬇ Download Matched CSV</button>
  </div>`;

  window._matches = matches;
  return stats + table + unmGrid + btns;
}

function render() {
  renderSteps();
  const app = document.getElementById("app");
  if (state.step === "upload") app.innerHTML = renderUpload();
  else if (state.step === "config") app.innerHTML = renderConfig();
  else if (state.step === "results") app.innerHTML = renderResults();
}

// File handling
window.triggerFile = (which) => document.getElementById("fi"+which).click();
window.handleDrop = async (e, which) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  try {
    const data = await parseFile(file);
    if (which===1) setState({ sheet1: data, file1: file.name });
    else setState({ sheet2: data, file2: file.name });
  } catch { showError("Failed to parse file."); }
};
window.handleFileInput = async (e, which) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const data = await parseFile(file);
    if (which===1) setState({ sheet1: data, file1: file.name });
    else setState({ sheet2: data, file2: file.name });
  } catch { showError("Failed to parse file."); }
};
window.setState = setState;
window.runMatching = runMatching;
window.downloadCSV = downloadCSV;

render();
</script>
</body>
</html>
