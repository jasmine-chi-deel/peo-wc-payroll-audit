<!DOCTYPE html>
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f7f8fa; color: #1a1a2e; min-height: 100vh; padding: 24px; }
  h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; }
  .subtitle { color: #6b7280; font-size: 13px; margin-top: 4px; }
  .card { background: #fff; border-radius: 14px; border: 1px solid #e5e7eb; padding: 24px; margin-top: 20px; }
  label.field-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  input[type=month] { border: 1px solid #d1d5db; border-radius: 8px; padding: 8px 12px; font-size: 13px; outline: none; }
  .section-title { font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; margin-top: 20px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .drop-zone { border: 2px dashed #d1d5db; border-radius: 12px; padding: 16px; transition: border-color 0.2s; }
  .drop-zone.ready { border-color: #22c55e; background: #f0fdf4; }
  .drop-zone .dz-label { font-size: 13px; font-weight: 600; color: #1f2937; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .dz-desc { font-size: 11px; color: #9ca3af; margin-bottom: 12px; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; }
  .tag-main { background: #1f2937; color: #fff; }
  .tag-wi { background: #ede9fe; color: #7c3aed; }
  .tag-opt { background: #f3f4f6; color: #6b7280; }
  .tag-prism { background: #dbeafe; color: #1d4ed8; }
  .choose-btn { display: inline-block; background: #1f2937; color: #fff; font-size: 12px; padding: 6px 14px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
  .choose-btn:hover { background: #374151; }
  .file-ready { font-size: 12px; color: #16a34a; font-weight: 500; }
  .remove-btn { font-size: 11px; color: #9ca3af; cursor: pointer; margin-left: 8px; border: none; background: none; }
  .remove-btn:hover { color: #ef4444; }
  .error { background: #fef2f2; color: #dc2626; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 12px; }
  .run-btn { width: 100%; margin-top: 20px; padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .run-btn.active { background: #1f2937; color: #fff; }
  .run-btn.active:hover { background: #374151; }
  .run-btn.disabled { background: #f3f4f6; color: #9ca3af; cursor: not-allowed; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tabs { display: flex; gap: 0; border-bottom: 1px solid #e5e7eb; margin-bottom: 20px; }
  .tab { padding: 10px 18px; font-size: 13px; font-weight: 500; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; color: #9ca3af; transition: all 0.15s; }
  .tab.active { border-bottom-color: #1f2937; color: #1f2937; }
  .new-audit { margin-left: auto; font-size: 13px; color: #9ca3af; background: none; border: none; cursor: pointer; padding: 10px 0; }
  .new-audit:hover { color: #374151; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
  .stat-card { border-radius: 12px; padding: 16px; }
  .stat-card .num { font-size: 28px; font-weight: 700; }
  .stat-card .lbl { font-size: 12px; opacity: 0.8; margin-top: 4px; }
  .sc-dark { background: #1f2937; color: #fff; }
  .sc-green { background: #16a34a; color: #fff; }
  .sc-red { background: #dc2626; color: #fff; }
  .sc-yellow { background: #d97706; color: #fff; }
  .sc-blue { background: #2563eb; color: #fff; }
  .breakdown { margin-bottom: 20px; }
  .breakdown-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
  .breakdown-item { background: #f9fafb; border-radius: 8px; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }
  .breakdown-item span { font-size: 12px; font-weight: 500; color: #374151; }
  .breakdown-item strong { font-size: 14px; font-weight: 700; color: #1f2937; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .filter-btn { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; border: none; cursor: pointer; transition: all 0.15s; }
  .filter-btn.on { background: #1f2937; color: #fff; }
  .filter-btn.off { background: #f3f4f6; color: #374151; }
  .filter-btn.off:hover { background: #e5e7eb; }
  .search-input { border: 1px solid #e5e7eb; border-radius: 8px; padding: 6px 12px; font-size: 12px; outline: none; width: 180px; }
  .btn-row { display: flex; gap: 8px; align-items: center; }
  .export-btn { background: #16a34a; color: #fff; border: none; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .export-btn:hover { background: #15803d; }
  .hs-btn { background: #ff7a59; color: #fff; border: none; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .hs-btn:hover { background: #e8623e; }
  .hs-btn:disabled { background: #fbb49e; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.07em; border-bottom: 1px solid #f3f4f6; }
  td { padding: 10px 12px; border-bottom: 1px solid #f9fafb; color: #374151; }
  tr:hover td { background: #f9fafb; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }
  .badge-keep { background: #dcfce7; color: #15803d; }
  .badge-term { background: #fee2e2; color: #b91c1c; }
  .badge-reason { background: #f3f4f6; color: #374151; }
  .empty { text-align: center; color: #9ca3af; padding: 32px; font-size: 13px; }
  .overflow-x { overflow-x: auto; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: #fff; border-radius: 16px; padding: 28px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal h2 { font-size: 17px; font-weight: 700; color: #1f2937; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .modal .modal-sub { font-size: 12px; color: #9ca3af; margin-bottom: 20px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; }
  .modal-field input, .modal-field select, .modal-field textarea { width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 8px 12px; font-size: 13px; outline: none; font-family: inherit; }
  .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { border-color: #ff7a59; box-shadow: 0 0 0 3px rgba(255,122,89,0.1); }
  .modal-field textarea { resize: vertical; min-height: 70px; }
  .modal-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-footer { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .modal-cancel { background: #f3f4f6; color: #374151; border: none; padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .modal-cancel:hover { background: #e5e7eb; }
  .modal-submit { background: #ff7a59; color: #fff; border: none; padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .modal-submit:hover { background: #e8623e; }
  .modal-submit:disabled { background: #fbb49e; cursor: not-allowed; }
  .modal-success { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 14px 16px; margin-top: 16px; font-size: 13px; color: #15803d; font-weight: 500; }
  .modal-error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px; padding: 14px 16px; margin-top: 16px; font-size: 13px; color: #dc2626; }
  .summary-box { background: #f9fafb; border-radius: 10px; padding: 14px 16px; margin-bottom: 18px; font-size: 12px; color: #374151; line-height: 1.8; }
  .summary-box strong { color: #1f2937; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #1f2937; color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>
<script>
const MONOPOLISTIC_STATES = ["OH","WA","WY","ND"];

function padId(id){ return String(id).trim().replace(/\.0+$/,"").padStart(6,"0"); }
function extractClientId(val){ if(!val) return ""; const str=String(val).trim(); const idx=str.indexOf("-"); return (idx===-1?str:str.slice(0,idx)).replace(/\.0+$/,""); }

// FIXED: Extract state from second segment (handles CLIENTID-NY-1 format)
function extractState(val){
  if(!val) return "";
  const parts = String(val).trim().split("-");
  if(parts.length >= 2) return parts[1].toUpperCase();
  return String(val).slice(-2).toUpperCase();
}

function extractMissingClientId(val){ if(!val) return ""; const str=String(val).trim(); const si=str.indexOf(" "); const clean=si!==-1?str.slice(0,si):str; const di=clean.indexOf("-"); return di===-1?clean:clean.slice(0,di); }
function extractMissingState(val){
  if(!val) return "";
  const str=String(val).trim();
  const si=str.indexOf(" ");
  const clean=si!==-1?str.slice(0,si):str;
  const parts=clean.split("-");
  if(parts.length>=2) return parts[1].toUpperCase();
  return clean.slice(-2).toUpperCase();
}
function isDeelClient(name,rawId,clientIdCol){ return String(clientIdCol).toLowerCase().trim()==="deel"||String(name).toLowerCase().replace(/\s/g,"").includes("deel")||String(rawId).toLowerCase().includes("deel"); }
function parseDate(val){ if(!val) return null; if(val instanceof Date) return val; if(typeof val==="string"&&val.includes("/")){ const p=val.split("/"); if(p.length===3){ const d=new Date(parseInt(p[2]),parseInt(p[0])-1,parseInt(p[1])); return isNaN(d)?null:d; } } const d=new Date(val); return isNaN(d)?null:d; }
function isFutureMonth(date,m,y){ if(!date) return false; if(date.getFullYear()>y) return true; if(date.getFullYear()===y&&date.getMonth()>m) return true; return false; }
function isFuturePayrollDate(date,m,y){ if(!date) return false; if(isFutureMonth(date,m,y)) return true; if(date.getFullYear()===y&&date.getMonth()===m&&date.getDate()>=15) return true; return false; }

function buildClientMap(data){
  const map={};
  data.filter(row=>{ const v=String(Object.values(row)[1]||"").trim(); return v!==""&&!v.includes("IMPL CLONE ACCOUNT"); })
  .forEach(row=>{ const vals=Object.values(row); const raw=String(vals[0]||"").trim().replace(/\.0+$/,""); const status=String(vals[2]||"").trim().toUpperCase(); map[padId(raw)]=status; map[raw]=status; });
  return map;
}
function buildEmployeeMap(data){
  const map={};
  data.forEach(row=>{ const vals=Object.values(row); const raw=String(vals[0]||"").trim().replace(/\.0+$/,""); const id=padId(raw); const wcCode=String(vals[2]||"").trim(); const dotIdx=wcCode.indexOf("."); const state=dotIdx!==-1?wcCode.slice(0,dotIdx).toUpperCase():wcCode.slice(0,2).toUpperCase(); const classCode=dotIdx!==-1?wcCode.slice(dotIdx+1):wcCode.slice(2); const status=String(vals[3]||"").trim(); const hireDate=parseDate(vals[4]); const key=id+"."+state; if(!map[key]) map[key]=[]; map[key].push({status,hireDate,classCode}); });
  return map;
}
function analyzeHasCert(mainData,clientData,employeeData,payrollMonth){
  const d=new Date(payrollMonth+"-01"); const year=d.getFullYear(),month=d.getMonth();
  const clientMap=buildClientMap(clientData); const employeeMap=buildEmployeeMap(employeeData);
  const results=[]; const summary={keep:0,terminate:0,review:0,total:0};
  mainData.forEach((row,idx)=>{
    const vals=Object.values(row); const rawId=String(vals[1]||"").trim(); const clientIdCol=String(vals[1]||"").trim();
    const clientId=padId(extractClientId(rawId)); const state=extractState(rawId); const concat=clientId+"."+state;
    const clientName=String(vals[2]||"").trim(); const setupDate=parseDate(vals[3]); const lastPayrollDate=parseDate(vals[4]);
    let decision="",comment="";
    if(isDeelClient(clientName,rawId,clientIdCol)){decision="Keep";comment="Compliance";}
    else if(MONOPOLISTIC_STATES.includes(state)){decision="Terminate";comment="Monopolistic";}
    else if(isFuturePayrollDate(setupDate,month,year)||isFuturePayrollDate(lastPayrollDate,month,year)){decision="Keep";comment="New Client";}
    else if(clientMap[clientId]==="T"){decision="Terminate";comment="Terminated Client";}
    else if(employeeMap[concat]!==undefined){
      const entries=employeeMap[concat]; const statuses=entries.map(e=>String(e.status||"").toLowerCase());
      const anyLeave=statuses.some(s=>s.includes("leave")||s.includes("furlough")||s.includes("absence"));
      const allTerminated=statuses.every(s=>s.includes("terminat"));
      const anyFutureHire=entries.some(e=>e.hireDate&&isFuturePayrollDate(e.hireDate,month,year));
      if(anyLeave){decision="Keep";comment="Leave";}
      else if(allTerminated){decision="Terminate";comment="EE Terminated";}
      else if(anyFutureHire){decision="Keep";comment="Future Hire";}
      else{decision="Keep";comment="In Review";}
    } else {decision="Terminate";comment="EE Terminated";}
    if(decision==="Keep") summary.keep++; else summary.terminate++;
    if(comment==="In Review") summary.review++;
    summary.total++;
    results.push({idx:idx+1,rawId,clientId,state,concat,clientName,decision,comment});
  });
  return{results,summary};
}
function analyzeMissingClients(missingData,employeeData){
  const employeeMap=buildEmployeeMap(employeeData); const results=[];
  missingData.forEach((row,idx)=>{ const vals=Object.values(row); const rawVal=String(vals[0]||"").trim(); if(!rawVal) return;
    const clientId=padId(extractMissingClientId(rawVal)); const state=extractMissingState(rawVal); const concat=clientId+"."+state;
    const entries=employeeMap[concat]||[]; let classCode="N/A",status="N/A",decision="Terminate";
    if(entries.length>0){ const active=entries.find(e=>!String(e.status||"").toLowerCase().includes("terminat")); const entry=active||entries[0]; classCode=entry.classCode||"N/A"; status=entry.status||"N/A"; decision=active?"Keep":"Terminate"; }
    results.push({idx:idx+1,rawId:rawVal,clientId,state,concat,classCode,status,decision});
  });
  return results;
}
function parseExcelFile(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>{ try{ res(XLSX.read(e.target.result,{type:"array",cellDates:true})); }catch(err){rej(err);} }; r.onerror=rej; r.readAsArrayBuffer(file); }); }
function getSheetData(wb){ const sheet=wb.Sheets[wb.SheetNames[0]]; return XLSX.utils.sheet_to_json(sheet,{defval:""}); }

function downloadExcel(rows, sheetName, filename) {
  try {
    const ws=XLSX.utils.json_to_sheet(rows); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,sheetName);
    const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const blob=new Blob([wbout],{type:'application/octet-stream'});
    const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); setTimeout(()=>{ URL.revokeObjectURL(url); document.body.removeChild(a); },500);
    showToast('✓ Download started: '+filename);
  } catch(e){ showToast('⚠ Export failed: '+e.message); }
}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

window.exportHasCert = function(results,payrollMonth){
  const rows=results.map(r=>({"Row":r.idx,"Group ID":r.rawId,"Client ID":r.clientId,"State":r.state,"Concatenate":r.concat,"Client Name":r.clientName,"Keep/Terminate":r.decision,"Comments":r.comment}));
  downloadExcel(rows,"Audit Results","WC_Payroll_Audit_"+payrollMonth+".xlsx");
};
window.exportMissing = function(results,payrollMonth){
  const rows=results.map(r=>({"Group ID":r.rawId,"Client ID":r.clientId,"State":r.state,"Concatenate":r.concat,"Class Code":r.classCode,"Status":r.status}));
  downloadExcel(rows,"Active","Missing_Clients_"+payrollMonth+".xlsx");
};

let hsModalState = { open:false, submitting:false, success:false, error:"" };

window.openHsModal = function() { hsModalState={open:true,submitting:false,success:false,error:""}; renderModal(); };
window.closeHsModal = function() { hsModalState.open=false; document.getElementById('modal-root').innerHTML=""; };

window.submitHubspot = async function() {
  const apiKey=document.getElementById('hs-apikey').value.trim();
  const company=document.getElementById('hs-company').value.trim();
  const dealName=document.getElementById('hs-deal').value.trim();
  const stage=document.getElementById('hs-stage').value;
  const amount=document.getElementById('hs-amount').value.trim();
  const closeDate=document.getElementById('hs-closedate').value;
  const notes=document.getElementById('hs-notes').value.trim();
  if(!apiKey||!company||!dealName){ hsModalState.error="API Key, Company Name, and Deal Name are required."; renderModal(); return; }
  hsModalState.submitting=true; hsModalState.error=""; renderModal();
  try {
    const summary=state.hasCertSummary; const month=state.payrollMonth;
    const searchRes=await fetch("https://api.hubapi.com/crm/v3/objects/companies/search",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},body:JSON.stringify({filterGroups:[{filters:[{propertyName:"name",operator:"EQ",value:company}]}],properties:["name","hs_object_id"]})});
    const searchData=await searchRes.json();
    let companyId=searchData.results&&searchData.results.length>0?searchData.results[0].id:null;
    if(!companyId){
      const createCoRes=await fetch("https://api.hubapi.com/crm/v3/objects/companies",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},body:JSON.stringify({properties:{name:company}})});
      const createCoData=await createCoRes.json();
      if(!createCoData.id) throw new Error(createCoData.message||"Failed to create company");
      companyId=createCoData.id;
    }
    const dealProps={dealname:dealName,dealstage:stage,pipeline:"default"};
    if(amount) dealProps.amount=amount;
    if(closeDate) dealProps.closedate=new Date(closeDate).getTime();
    if(notes||summary){
      const auditNote=summary?`WC Payroll Audit – ${month}\nTotal: ${summary.total} | Keep: ${summary.keep} | Terminate: ${summary.terminate}\n\n${notes}`:notes;
      dealProps.description=auditNote;
    }
    const dealRes=await fetch("https://api.hubapi.com/crm/v3/objects/deals",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},body:JSON.stringify({properties:dealProps})});
    const dealData=await dealRes.json();
    if(!dealData.id) throw new Error(dealData.message||"Failed to create deal");
    await fetch(`https://api.hubapi.com/crm/v3/objects/deals/${dealData.id}/associations/companies/${companyId}/deal_to_company`,{method:"PUT",headers:{"Authorization":"Bearer "+apiKey}});
    hsModalState.submitting=false; hsModalState.success=true; hsModalState.error="";
    renderModal(); showToast("✓ HubSpot deal created successfully!");
  } catch(err){
    hsModalState.submitting=false; hsModalState.error=err.message||"Something went wrong. Check your API key and try again."; renderModal();
  }
};

function renderModal(){
  const root=document.getElementById('modal-root');
  if(!hsModalState.open){root.innerHTML="";return;}
  const s=state.hasCertSummary; const month=state.payrollMonth;
  root.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeHsModal()"><div class="modal">
    <h2>🔶 Send to HubSpot</h2>
    <p class="modal-sub">Create or update a deal in HubSpot with this audit's results</p>
    ${s?`<div class="summary-box">📋 <strong>Audit Summary – ${month}</strong><br/>Total Records: <strong>${s.total}</strong> &nbsp;|&nbsp; Keep: <strong style="color:#16a34a">${s.keep}</strong> &nbsp;|&nbsp; Terminate: <strong style="color:#dc2626">${s.terminate}</strong></div>`:""}
    <div class="modal-field"><label>HubSpot Private App API Key *</label><input id="hs-apikey" type="password" placeholder="pat-na1-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" /></div>
    <div class="modal-grid2">
      <div class="modal-field"><label>Company Name *</label><input id="hs-company" type="text" placeholder="Acme Corp" /></div>
      <div class="modal-field"><label>Deal Name *</label><input id="hs-deal" type="text" placeholder="WC Audit – ${month}" value="WC Audit – ${month}" /></div>
    </div>
    <div class="modal-grid2">
      <div class="modal-field"><label>Deal Stage</label><select id="hs-stage"><option value="appointmentscheduled">Appointment Scheduled</option><option value="qualifiedtobuy">Qualified to Buy</option><option value="presentationscheduled">Presentation Scheduled</option><option value="decisionmakerboughtin">Decision Maker Bought-In</option><option value="contractsent" selected>Contract Sent</option><option value="closedwon">Closed Won</option><option value="closedlost">Closed Lost</option></select></div>
      <div class="modal-field"><label>Amount ($)</label><input id="hs-amount" type="number" placeholder="0.00" /></div>
    </div>
    <div class="modal-field"><label>Close Date</label><input id="hs-closedate" type="date" /></div>
    <div class="modal-field"><label>Additional Notes</label><textarea id="hs-notes" placeholder="Any extra context to include in the deal description..."></textarea></div>
    ${hsModalState.error?`<div class="modal-error-box">⚠ ${hsModalState.error}</div>`:""}
    ${hsModalState.success?`<div class="modal-success">✓ Deal successfully created in HubSpot and linked to the company!</div>`:""}
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeHsModal()">Cancel</button>
      ${!hsModalState.success?`<button class="modal-submit" onclick="submitHubspot()" ${hsModalState.submitting?"disabled":""}>${hsModalState.submitting?'<div class="spinner"></div> Sending...':'🚀 Send to HubSpot'}</button>`:`<button class="modal-cancel" onclick="closeHsModal()">Close</button>`}
    </div>
  </div></div>`;
}

let state = {
  payrollMonth:"", files:{main:null,main575:null,missing:null,missing575:null,client:null,employee:null},
  step:0, loading:false, error:"",
  hasCertResults:null, hasCertSummary:null, missingResults:null,
  activeTab:"hascert", filter:"All", search:""
};

function render(){ document.getElementById("app").innerHTML=buildHTML(); attachEvents(); }

function buildHTML(){ return `<div style="max-width:960px;margin:0 auto;"><div style="margin-bottom:24px;"><h1>WC Payroll Audit Tool</h1><p class="subtitle">Upload your reports to get instant analysis</p></div>${state.step!==2?buildUploadPanel():buildResults()}</div>`; }

function buildUploadPanel(){
  const allReady=state.files.main&&state.files.client&&state.files.employee&&state.payrollMonth;
  return `<div class="card">
    <label class="field-label">Payroll Month</label>
    <input type="month" id="month-input" value="${state.payrollMonth}" style="margin-bottom:20px;" />
    <p class="section-title">CA075 Reports</p>
    <div class="grid2">
      ${buildDropZone("main","CA075 – Has Cert, No Payroll","Main audit file","tag-main","Main File")}
      ${buildDropZone("main575","CA575 – Has Cert, No Payroll (WI)","WI policy – same format as CA075","tag-wi","WI Policy")}
      ${buildDropZone("missing","CA075 – Missing Clients","CA07 missing clients (optional)","tag-opt","Optional")}
      ${buildDropZone("missing575","CA575 – Missing Clients (WI)","CA57 missing clients WI (optional)","tag-opt","Optional")}
    </div>
    <p class="section-title">Prism Reports</p>
    <div class="grid2">
      ${buildDropZone("client","Client Report","WC Payroll Audit – Client","tag-prism","Prism")}
      ${buildDropZone("employee","Employee Report","WC Payroll Audit – Employee","tag-prism","Prism")}
    </div>
  </div>
  ${state.error?`<div class="error">${state.error}</div>`:""}
  <button class="run-btn ${allReady&&!state.loading?"active":"disabled"}" id="run-btn" ${!allReady||state.loading?"disabled":""}>
    ${state.loading?`<div class="spinner"></div> Running audit...`:"Run Audit Analysis →"}
  </button>`;
}

function buildDropZone(key,label,desc,tagClass,tagLabel){
  const file=state.files[key];
  return `<div class="drop-zone ${file?"ready":""}">
    <div class="dz-label">${label} <span class="tag ${tagClass}">${tagLabel}</span></div>
    <div class="dz-desc">${desc}</div>
    ${file?`<span class="file-ready">✓ ${file.name}</span><button class="remove-btn" onclick="removeFile('${key}')">Remove</button>`:`<label class="choose-btn">Choose File<input type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile('${key}',this)" /></label>`}
  </div>`;
}

function buildResults(){
  const hasMissing=state.missingResults&&state.missingResults.length>0;
  return `<div class="tabs">
    <button class="tab ${state.activeTab==="hascert"?"active":""}" onclick="setTab('hascert')">Has Cert, No Payroll</button>
    ${hasMissing?`<button class="tab ${state.activeTab==="missing"?"active":""}" onclick="setTab('missing')">Missing Clients <span style="font-size:11px;background:#f3f4f6;color:#6b7280;padding:2px 8px;border-radius:20px;margin-left:4px;">${state.missingResults.length}</span></button>`:""}
    <button class="new-audit" onclick="reset()">New Audit</button>
  </div>
  ${state.activeTab==="hascert"?buildHasCertTab():buildMissingTab()}`;
}

function buildHasCertTab(){
  const{hasCertResults,hasCertSummary,filter,search}=state;
  if(!hasCertResults) return "";
  const filtered=hasCertResults.filter(r=>{
    const mf=filter==="All"||r.decision===filter||(filter==="In Review"&&r.comment==="In Review");
    const ms=!search||r.clientName.toLowerCase().includes(search.toLowerCase())||r.clientId.includes(search);
    return mf&&ms;
  });
  const breakdown=hasCertResults.reduce((acc,r)=>{acc[r.comment]=(acc[r.comment]||0)+1;return acc;},{});
  const reviewCount=hasCertResults.filter(r=>r.comment==="In Review").length;
  return `
  <div class="stats-grid">
    <div class="stat-card sc-dark"><div class="num">${hasCertSummary.total}</div><div class="lbl">Total Records</div></div>
    <div class="stat-card sc-green"><div class="num">${hasCertSummary.keep}</div><div class="lbl">Keep</div></div>
    <div class="stat-card sc-red"><div class="num">${hasCertSummary.terminate}</div><div class="lbl">Terminate</div></div>
    <div class="stat-card sc-yellow"><div class="num">${reviewCount}</div><div class="lbl">In Review</div></div>
  </div>
  <div class="card breakdown">
    <div class="field-label" style="margin-bottom:12px;">Breakdown by Reason</div>
    <div class="breakdown-grid">
      ${Object.entries(breakdown).sort((a,b)=>b[1]-a[1]).map(([reason,count])=>`<div class="breakdown-item"><span>${reason}</span><strong>${count}</strong></div>`).join("")}
    </div>
  </div>
  <div class="card">
    <div class="filters">
      ${["All","Keep","Terminate","In Review"].map(f=>`<button class="filter-btn ${filter===f?"on":"off"}" onclick="setFilter('${f}')">${f}</button>`).join("")}
      <input class="search-input" placeholder="Search client / ID..." value="${search}" oninput="setSearch(this.value)" style="margin-left:auto;" />
      <div class="btn-row">
        <button class="export-btn" onclick="exportHasCert(state.hasCertResults,state.payrollMonth)">⬇ Export Excel</button>
        <button class="hs-btn" onclick="openHsModal()">🔶 Send to HubSpot</button>
      </div>
    </div>
    <div class="overflow-x">
      <table>
        <thead><tr><th>#</th><th>Client ID</th><th>State</th><th>Client Name</th><th>Decision</th><th>Reason</th></tr></thead>
        <tbody>
          ${filtered.length===0?`<tr><td colspan="6" class="empty">No records match your filter</td></tr>`:filtered.map(r=>`<tr>
            <td style="color:#9ca3af;font-size:11px;">${r.idx}</td>
            <td style="font-family:monospace;font-size:12px;">${r.clientId}</td>
            <td>${r.state}</td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.clientName||"—"}</td>
            <td><span class="badge ${r.decision==="Keep"?"badge-keep":"badge-term"}">${r.decision}</span></td>
            <td><span class="badge badge-reason">${r.comment}</span></td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>
  </div>`;
}

function buildMissingTab(){
  const{missingResults,search}=state;
  if(!missingResults) return "";
  const filtered=missingResults.filter(r=>!search||r.clientId.includes(search)||r.state.includes(search.toUpperCase()));
  const states=[...new Set(missingResults.map(r=>r.state))].length;
  return `
  <div class="stats-grid">
    <div class="stat-card sc-dark"><div class="num">${missingResults.length}</div><div class="lbl">Total Records</div></div>
    <div class="stat-card sc-green"><div class="num">${missingResults.filter(r=>r.decision==="Keep").length}</div><div class="lbl">Keep</div></div>
    <div class="stat-card sc-red"><div class="num">${missingResults.filter(r=>r.decision==="Terminate").length}</div><div class="lbl">Terminate</div></div>
    <div class="stat-card sc-blue"><div class="num">${states}</div><div class="lbl">States</div></div>
  </div>
  <div class="card">
    <div class="filters">
      <input class="search-input" placeholder="Search client / state..." value="${search}" oninput="setSearch(this.value)" style="margin-left:0;" />
      <div class="btn-row" style="margin-left:auto;">
        <button class="export-btn" onclick="exportMissing(state.missingResults,state.payrollMonth)">⬇ Export Excel</button>
        <button class="hs-btn" onclick="openHsModal()">🔶 Send to HubSpot</button>
      </div>
    </div>
    <div class="overflow-x">
      <table>
        <thead><tr><th>#</th><th>Group ID</th><th>Client ID</th><th>State</th><th>Class Code</th><th>Status</th><th>Decision</th></tr></thead>
        <tbody>
          ${filtered.length===0?`<tr><td colspan="7" class="empty">No records found</td></tr>`:filtered.map(r=>`<tr>
            <td style="color:#9ca3af;font-size:11px;">${r.idx}</td>
            <td style="font-size:11px;">${r.rawId}</td>
            <td style="font-family:monospace;font-size:12px;">${r.clientId}</td>
            <td>${r.state}</td>
            <td>${r.classCode}</td>
            <td><span class="badge badge-reason">${r.status}</span></td>
            <td><span class="badge ${r.decision==="Keep"?"badge-keep":"badge-term"}">${r.decision}</span></td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>
  </div>`;
}

function attachEvents(){
  const mi=document.getElementById("month-input");
  if(mi) mi.addEventListener("change",e=>{state.payrollMonth=e.target.value;render();});
  const rb=document.getElementById("run-btn");
  if(rb) rb.addEventListener("click",runAnalysis);
}

window.removeFile=function(key){state.files[key]=null;render();};
window.handleFile=function(key,input){if(input.files[0]){state.files[key]=input.files[0];render();}};
window.setTab=function(tab){state.activeTab=tab;render();};
window.setFilter=function(f){state.filter=f;render();};
window.setSearch=function(v){state.search=v;render();};
window.reset=function(){state={...state,step:0,files:{main:null,main575:null,missing:null,missing575:null,client:null,employee:null},hasCertResults:null,hasCertSummary:null,missingResults:null,filter:"All",search:"",error:"",activeTab:"hascert"};render();};

async function runAnalysis(){
  const{files,payrollMonth}=state;
  if(!files.main||!files.client||!files.employee||!payrollMonth) return;
  state.loading=true;state.error="";render();
  try{
    const toLoad=[parseExcelFile(files.main),parseExcelFile(files.client),parseExcelFile(files.employee)];
    if(files.main575) toLoad.push(parseExcelFile(files.main575));
    if(files.missing) toLoad.push(parseExcelFile(files.missing));
    if(files.missing575) toLoad.push(parseExcelFile(files.missing575));
    const wbs=await Promise.all(toLoad);
    const[mainWb,clientWb,employeeWb]=wbs; let wbIdx=3;
    const main575Wb=files.main575?wbs[wbIdx++]:null;
    const missingWb=files.missing?wbs[wbIdx++]:null;
    const missing575Wb=files.missing575?wbs[wbIdx++]:null;
    const filterMain=(wb)=>getSheetData(wb).filter(row=>{
      const vals=Object.values(row);
      const colA=String(vals[0]||"").trim().toLowerCase(),colB=String(vals[1]||"").trim().toLowerCase(),colC=String(vals[2]||"").trim().toLowerCase();
      if(colA===""&&colB===""&&colC==="") return false;
      if(colB.includes("peo client")||colB==="no"||colC==="client co name") return false;
      return true;
    });
    const mainData=[...filterMain(mainWb),...(main575Wb?filterMain(main575Wb):[])];
    const clientData=getSheetData(clientWb),employeeData=getSheetData(employeeWb);
    const{results:hcr,summary:hcs}=analyzeHasCert(mainData,clientData,employeeData,payrollMonth);
    state.hasCertResults=hcr;state.hasCertSummary=hcs;
    if(missingWb||missing575Wb){
      const filterMissing=(wb)=>getSheetData(wb).filter(row=>String(Object.values(row)[0]||"").trim()!=="");
      const missingData=[...(missingWb?filterMissing(missingWb):[]),...(missing575Wb?filterMissing(missing575Wb):[])];
      state.missingResults=analyzeMissingClients(missingData,employeeData);
    }
    state.step=2;state.loading=false;render();
  }catch(err){state.error="Processing failed: "+err.message;state.loading=false;render();}
}

render();
</script>
</body>
</html>
